services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/x1erra}/horserace-analyzer-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLISHED_PORT:-5001}:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TRACKDATA_UPLOAD_FOLDER=/app/uploads
      - DRF_PARSE_TIMEOUT_SECONDS=${DRF_PARSE_TIMEOUT_SECONDS:-240}
      - DRF_PARSE_WORKERS=${DRF_PARSE_WORKERS:-1}
      - TZ=America/New_York
      - FLASK_ENV=production
    volumes:
      - ${TRACKDATA_UPLOADS_DIR:-./uploads}:/app/uploads
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "python3", "-c", "import requests; requests.get('http://127.0.0.1:5001/api/health/live', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    image: ${IMAGE_REGISTRY:-ghcr.io/x1erra}/horserace-analyzer-scheduler:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TZ=America/New_York
    volumes:
      - ./logs:/var/log
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
        reservations:
          memory: 128M
    healthcheck:
      test: [ "CMD", "find", "/tmp/crawler_heartbeat", "-mmin", "-20" ]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    image: ${IMAGE_REGISTRY:-ghcr.io/x1erra}/horserace-analyzer-mcp:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${MCP_PUBLISHED_PORT:-8001}:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TZ=America/New_York
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    command: [ "python3", "backend/mcp_server.py" ]
    healthcheck:
      test: [ "CMD", "python3", "-c", "import requests, sys; r = requests.get('http://127.0.0.1:8001/sse', headers={'Accept': 'text/event-stream'}, stream=True, timeout=(2, 5)); ok = r.status_code == 200 and r.headers.get('content-type', '').startswith('text/event-stream'); r.close(); sys.exit(0 if ok else 1)" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  horse-racing-network:
    driver: bridge
