name: Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - backend/Dockerfile.scheduler
      - backend/**
      - requirements.txt
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: horserace-analyzer-backend
            dockerfile: Dockerfile
          - image_name: horserace-analyzer-mcp
            dockerfile: Dockerfile
          - image_name: horserace-analyzer-scheduler
            dockerfile: backend/Dockerfile.scheduler
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
