services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Pi-friendly memory cap for Flask API + DRF parsing subprocesses.
    mem_limit: 768m
    ports:
      - "${BACKEND_PUBLISHED_PORT:-5001}:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TZ=America/New_York
      - FLASK_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    healthcheck:
      # Keep this cheap: just verify the API process is listening, not that it can serve a full HTTP request under load.
      test: [ "CMD", "python3", "-c", "import socket, sys; s = socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5001)); s.close()" ]
      interval: 180s
      timeout: 10s
      retries: 10
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile.scheduler
    restart: unless-stopped
    # Pi-friendly memory cap for the overnight crawler workload.
    mem_limit: 512m
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TZ=America/New_York
    volumes:
      - ./logs:/var/log
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Overnight jobs can legitimately run a long time on the Pi, so allow a much older heartbeat before failing.
      test: [ "CMD", "find", "/tmp/crawler_heartbeat", "-mmin", "-180" ]
      interval: 1800s
      timeout: 10s
      retries: 3
      start_period: 900s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Keep the MCP sidecar bounded so backend work gets priority on the Pi.
    mem_limit: 512m
    ports:
      - "${MCP_PUBLISHED_PORT:-8001}:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TZ=America/New_York
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    command: [ "python3", "backend/mcp_server.py" ]
    healthcheck:
      # Port-open check is far more reliable on a Pi than opening an SSE stream for every health probe.
      test: [ "CMD", "python3", "-c", "import socket, sys; s = socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8001)); s.close()" ]
      interval: 300s
      timeout: 10s
      retries: 10
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  horse-racing-network:
    driver: bridge
