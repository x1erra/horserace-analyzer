services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Pi-friendly memory cap for Flask API + DRF parsing subprocesses.
    mem_limit: 768m
    ports:
      - "${BACKEND_PUBLISHED_PORT:-5001}:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TRACKDATA_UPLOAD_FOLDER=/app/uploads
      - DRF_PARSE_TIMEOUT_SECONDS=${DRF_PARSE_TIMEOUT_SECONDS:-240}
      - DRF_PARSE_WORKERS=${DRF_PARSE_WORKERS:-1}
      - TZ=America/New_York
      - FLASK_ENV=production
    volumes:
      - ${TRACKDATA_UPLOADS_DIR:-./uploads}:/app/uploads
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    # Docker healthchecks rely on exec/fork inside the container, which is unreliable under Pi memory pressure.
    # TrackData health is monitored from the host via real service endpoints instead.
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile.scheduler
    restart: unless-stopped
    # Results/PDF crawling with Chromium is bursty on the Pi, so keep headroom above observed ~900 MB peaks.
    mem_limit: 2048m
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ENABLE_HEAVY_SCRATCH_FALLBACKS=${ENABLE_HEAVY_SCRATCH_FALLBACKS:-0}
      - TZ=America/New_York
    volumes:
      - ./logs:/var/log
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_started
    # Scheduler health is monitored from the host via the mounted scheduler heartbeat file.
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Keep the MCP sidecar bounded so backend work gets priority on the Pi.
    mem_limit: 512m
    ports:
      - "${MCP_PUBLISHED_PORT:-8001}:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TZ=America/New_York
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_started
    command: [ "python3", "backend/mcp_server.py" ]
    # MCP health is monitored from the host via direct TCP/SSE checks rather than Docker exec healthchecks.
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  horse-racing-network:
    driver: bridge
