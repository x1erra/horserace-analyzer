services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLISHED_PORT:-5001}:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TZ=America/New_York
      - FLASK_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - horse-racing-network
    healthcheck:
      test: [ "CMD", "python3", "-c", "import requests; requests.get('http://127.0.0.1:5001/api/health/live', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile.scheduler
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TZ=America/New_York
    volumes:
      - ./logs:/var/log
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "find", "/tmp/crawler_heartbeat", "-mmin", "-20" ]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MCP_PUBLISHED_PORT:-8001}:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TZ=America/New_York
    networks:
      - horse-racing-network
    depends_on:
      backend:
        condition: service_healthy
    command: [ "python3", "backend/mcp_server.py" ]
    healthcheck:
      test: [ "CMD", "python3", "-c", "import requests, sys; r = requests.get('http://127.0.0.1:8001/mcp', headers={'Accept': 'text/event-stream'}, stream=True, timeout=(2, 5)); ok = r.status_code == 200 and r.headers.get('content-type', '').startswith('text/event-stream'); r.close(); sys.exit(0 if ok else 1)" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  horse-racing-network:
    driver: bridge
